<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Códigos Roblox Rivals</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #222;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #fff;
    }
    h2 {
      color: #333;
    }
    .code-box {
      background: #eee;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
    }
    .code {
      font-weight: bold;
      color: #d9534f;
    }
  </style>
</head>
<body>
  <header>
    <h1>Códigos Roblox Rivals</h1>
  </header>
  <div class="container">
    <h2>Lista de Códigos Ativos</h2>
    <div class="code-box">
      <p><span class="code">RIVALS2026</span> – Dá 500 moedas</p>
    </div>
    <div class="code-box">
      <p><span class="code">WINNERXP</span> – Dá 1000 XP</p>
    </div>

    <h2>Como Resgatar os Códigos</h2>
    <p>Abra o jogo Roblox Rivals, clique no ícone de “Códigos” e insira o código na caixa de texto. Depois, confirme para receber sua recompensa.</p>
  </div>
</body>
</html>
